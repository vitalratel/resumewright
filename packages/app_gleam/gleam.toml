name = "app_gleam"
version = "1.0.0"
target = "javascript"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
lustre = ">= 5.6.0 and < 6.0.0"
plinth = ">= 0.9.3 and < 1.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.3.4 and < 3.0.0"

[tools.lustre.build]
# Output alongside extension's static assets so WXT copies it into the build
outdir = "../extension/public/gleam"
# converter.html is supplied by WXT — skip the generated index.html
no_html = true
